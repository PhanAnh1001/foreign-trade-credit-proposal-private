# Pre-commit hooks — workflow §5.5 + §6.7 mitigations.
# Cài đặt:
#   pre-commit install
#   pre-commit install --hook-type commit-msg
repos:
  # 1. Secret leak (lỗ hổng #6.5.4)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  # 2. Lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # 3. SAST low-confidence (lỗ hổng #6.5.4)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-ll", "-r", "src/"]

  # 4. Type-check (lỗ hổng #6.5.7 hallucinated dep/API)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        additional_dependencies: ["pydantic>=2"]

  # 5. Hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # 6. Local hooks — workflow-specific
  - repo: local
    hooks:
      # Lỗ hổng #6.5.9: mỗi commit phải có T<n>:
      - id: enforce-task-id
        name: Commit msg must start with T<n>:
        entry: python tools/check_t_in_commit.py
        language: system
        stages: [commit-msg]

      # Lỗ hổng #6.5.1: AI tự tick approved
      - id: check-approver
        name: Approver must be in docs/reviewers.txt
        entry: python tools/check_approver.py --staged
        language: system
        files: \.md$
        pass_filenames: false

      # Lỗ hổng #6.6.11: stale fixture / golden output
      - id: check-golden-signoff
        name: Golden fixture change requires sign-off
        entry: python tools/check_golden_signoff.py
        language: system
        pass_filenames: false
